[colors]
base     = #1e1e2e
mantle   = #181825
crust    = #11111b
surface0 = #313244
surface1 = #45475a
overlay0 = #6c7086
text     = #cdd6f4
subtext0 = #a6adc8
rosewater = #f5e0dc
mauve    = #cba6f7
red      = #f38ba8
peach    = #fab387
yellow   = #f9e2af
green    = #a6e3a1
blue     = #89b4fa
lavender = #b4befe

[bar/main]
width = 100%
height = 24
background = ${colors.base}
foreground = ${colors.text}
line-size = 2
padding-left = 1
padding-right = 1
module-margin = 1
separator = |
separator-foreground = ${colors.surface1}
font-0 = JetBrainsMono Nerd Font:size=10;2
font-1 = JetBrainsMono Nerd Font:style=Bold:size=10;2

modules-left = i3
modules-center = date
modules-right = cpu memory disk network hostname

wm-restack = i3

[module/i3]
type = internal/i3
format = <label-state> <label-mode>
index-sort = true
wrapping-scroll = false

label-focused = %index%
label-focused-foreground = ${colors.crust}
label-focused-background = ${colors.blue}
label-focused-padding = 2
label-focused-underline = ${colors.blue}

label-unfocused = %index%
label-unfocused-foreground = ${colors.overlay0}
label-unfocused-padding = 2

label-urgent = %index%
label-urgent-foreground = ${colors.crust}
label-urgent-background = ${colors.red}
label-urgent-padding = 2

label-visible = %index%
label-visible-foreground = ${colors.subtext0}
label-visible-padding = 2

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "CPU "
format-prefix-foreground = ${colors.mauve}
label = %percentage%%
format-underline = ${colors.mauve}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "RAM "
format-prefix-foreground = ${colors.blue}
label = %percentage_used%%
format-underline = ${colors.blue}

[module/disk]
type = internal/fs
mount-0 = /
interval = 30
format-prefix = "DISK "
format-prefix-foreground = ${colors.green}
label-mounted = %percentage_used%%
format-mounted-underline = ${colors.green}

[module/network]
type = internal/network
interface = eth0
interval = 3
format-connected-prefix = "NET "
format-connected-prefix-foreground = ${colors.peach}
label-connected = %downspeed:8% ↓ %upspeed:8% ↑
format-connected-underline = ${colors.peach}
label-disconnected = disconnected
label-disconnected-foreground = ${colors.overlay0}

[module/hostname]
type = custom/script
exec = hostname
interval = 0
format-prefix = " "
format-prefix-foreground = ${colors.lavender}
format-underline = ${colors.lavender}
label-foreground = ${colors.lavender}

[module/date]
type = internal/date
interval = 1
date = %Y-%m-%d
time = %H:%M:%S
label = %date%  %time%
format-underline = ${colors.rosewater}
format-foreground = ${colors.rosewater}
