# Scratch shell popup: prefix + g
bind-key g if-shell -F '#{==:#{session_name},scratch}' \
  'detach-client' \
  'display-popup -E -w 38% -h 75% -x 61% -y 10% "tmux attach -t scratch || tmux new -s scratch"'

# Catppuccin Mocha-inspired status line.
set -g status on
set -g status-position top
set -g status-interval 5
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g status-left-length 80
set -g status-right-length 100
set -g status-left "#[bg=#89b4fa,fg=#11111b,bold] #S #[bg=#313244,fg=#89b4fa]#[bg=#313244,fg=#cdd6f4] #P/#{window_panes} #[bg=#1e1e2e,fg=#313244] "
set -g status-right "#[bg=#1e1e2e,fg=#313244]#[bg=#313244,fg=#a6e3a1,bold] %H:%M #[bg=#313244,fg=#45475a]#[bg=#313244,fg=#f5c2e7] %a %d %b #[bg=#313244,fg=#45475a]#[bg=#313244,fg=#fab387] #h "

set -g window-status-format "#[bg=#1e1e2e,fg=#45475a]#[fg=#6c7086] #I #[fg=#45475a]#W "
set -g window-status-current-format "#[bg=#1e1e2e,fg=#cba6f7]#[bg=#cba6f7,fg=#11111b,bold] #I #[fg=#1e1e2e]#W #[bg=#1e1e2e,fg=#cba6f7]"
set -g window-status-separator " "

set -g pane-active-border-style "fg=#89b4fa"
set -g pane-border-style "fg=#313244"
set -g message-style "bg=#313244,fg=#cdd6f4"
set -g mode-style "bg=#cba6f7,fg=#11111b"
